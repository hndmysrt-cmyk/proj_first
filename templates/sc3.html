<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدخال بيانات التنبؤ</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <main class="shell">
        <nav class="topbar" aria-label="التنقل الرئيسي">
            <a class="brand" href="{{ url_for('home') }}">
                <span class="brand-mark">⚡</span>
                <span>مؤشر الطاقة</span>
            </a>
            <div class="nav-actions">
                <span>{{ user.username }}</span>
                <a class="button secondary" href="{{ url_for('logout') }}">خروج</a>
            </div>
        </nav>

        <section class="panel-grid">
            <div class="page-copy">
                <h1>إدخال بيانات استهلاك الطاقة</h1>
                <p>املأ القيم الأساسية لليوم المطلوب، وسيتم تجهيز النتيجة في الشاشة التالية.</p>
            </div>

            <div class="card">
                <h2>بيانات التنبؤ</h2>
                {% if error %}
                    <p class="error">{{ error }}</p>
                {% endif %}
                <form class="form-grid" action="{{ url_for('training') }}" method="POST">
                    <label>
                        التاريخ
                        <input type="date" name="date" required>
                    </label>
                    <label>
                        درجة الحرارة (°C)
                        <input type="number" step="0.1" name="temperature" required>
                    </label>
                    <label>
                        يوم عمل
                        <select name="working_day" required>
                            <option value="1">نعم</option>
                            <option value="0">لا</option>
                        </select>
                    </label>
                    <label>
                        عدد الأجهزة
                        <input type="number" name="devices" min="1" required>
                    </label>
                    <div class="actions">
                        <button class="button" type="submit">حساب التنبؤ</button>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
