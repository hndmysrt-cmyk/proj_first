<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>إدخال بيانات التنبؤ</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="container">
    <div class="card">
      <h2>إدخال بيانات استهلاك الطاقة</h2>
      <form action="/preprocess" method="POST">
        <label>التاريخ</label>
        <input type="date" name="date" required>

        <label>درجة الحرارة (°C)</label>
        <input type="number" step="0.1" name="temperature" required>

        <label>يوم عمل</label>
        <select name="working_day" required style="width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px;">
            <option value="1">نعم</option>
            <option value="0">لا</option>
        </select>

        <label>عدد الأجهزة</label>
        <input type="number" name="devices" required>

        <button type="submit" style="background: #28a745;">تحميل </button>
        <br>
        <button onclick="goToLogin()">
              <a href="sc4.html">انتقال الي شاشة تدريب النموذج    </a>

                </button>
                



      </form>
    </div>
  </div>
</body>
</html>
